---
apiVersion: v1
kind: Service
metadata:
  name: pgb-repro-feeds-statistics
  namespace: repro
  annotations:
    ad.datadoghq.com/service.check_names: '["postgres"]'
    ad.datadoghq.com/service.init_configs: '[{}]'
    ad.datadoghq.com/service.instances: '[{"host": "postgres.repro.svc.cluster.local", "port": 5432, "username": "datadog", "password": "datadog", "dbname": "feeds_statistics", "dbstrict": true, "relations": [{"relation_regex": ".*"}], "max_relations": 300, "dbm": false, "collect_count_metrics": true, "collect_database_size_metrics": true, "custom_queries": [{"metric_prefix": "postgresql", "query": "SELECT 1 as status, activity.datname, activity.pid, blocking.pid AS blocking_pid FROM pg_stat_activity AS activity JOIN pg_stat_activity AS blocking ON blocking.pid = ANY(pg_blocking_pids(activity.pid))", "columns": [{"name": "blocked_query", "type": "gauge"}, {"name": "blocked_db", "type": "tag"}, {"name": "blocked_pid", "type": "tag"}, {"name": "blocking_pid", "type": "tag"}]}, {"metric_prefix": "postgresql", "query": "SELECT 1 as status, current_database() as database_name, indexrelid::regclass index_name FROM pg_index WHERE NOT indisvalid", "columns": [{"name": "corrupted_index", "type": "gauge"}, {"name": "database_name", "type": "tag"}, {"name": "index_name", "type": "tag"}]}]}]'
  labels:
    app: pgbouncer-repro
    database: feeds_statistics
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
