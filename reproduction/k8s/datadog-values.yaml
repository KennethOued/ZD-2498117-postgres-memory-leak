## Reproduction: ZD-2498117 / CONS-8148
## Agent 7.74.1 | Helm chart matching customer setup
## 52 Postgres instances with Source B config
## CCR with NO resource limits (BestEffort QoS)

datadog:
  apiKey: "${DD_API_KEY}"
  site: "datadoghq.com"
  clusterName: "repro-zd-2498117"
  clusterChecks:
    enabled: true
  dogstatsd:
    useHostPort: true
  logs:
    enabled: false
  apm:
    portEnabled: false
  processAgent:
    enabled: true
    processCollection: false
  orchestratorExplorer:
    enabled: true
  collectKubernetesEvents: true
  kubeStateMetricsEnabled: true
  kubelet:
    tlsVerify: false

agents:
  image:
    tag: "7.74.1"
  containers:
    agent:
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

clusterAgent:
  image:
    tag: "7.74.1"
  replicas: 1
  confd:
    postgres.yaml: |-
      cluster_check: true
      init_config:
      instances:
      - host: postgres.repro.svc.cluster.local
        port: 5432
        username: datadog
        password: datadog
        dbname: feeds_statistics
        dbstrict: true
        relations:
          - relation_regex: ".*"
        max_relations: 300
        dbm: false
        collect_count_metrics: true
        collect_database_size_metrics: true
        custom_queries:
          - metric_prefix: postgresql
            query: >-
              SELECT 1 as status, activity.datname, activity.pid,
              blocking.pid AS blocking_pid
              FROM pg_stat_activity AS activity
              JOIN pg_stat_activity AS blocking
              ON blocking.pid = ANY(pg_blocking_pids(activity.pid))
            columns:
              - name: blocked_query
                type: gauge
              - name: blocked_db
                type: tag
              - name: blocked_pid
                type: tag
              - name: blocking_pid
                type: tag
          - metric_prefix: postgresql
            query: >-
              SELECT 1 as status, current_database() as database_name,
              indexrelid::regclass index_name FROM pg_index WHERE NOT indisvalid
            columns:
              - name: corrupted_index
                type: gauge
              - name: database_name
                type: tag
              - name: index_name
                type: tag
